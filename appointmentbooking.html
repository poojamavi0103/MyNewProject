<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="responsivemosbile.css">
  <link rel="stylesheet" href="style.css">

  <title>Appointment Booking</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7fc;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      width:450px;
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#0077b6;
      margin-bottom:10px;
    }

    p{
      text-align:center;
      color:gray;
      margin-bottom:25px;
    }

    .input-box{
      margin-bottom:18px;
    }

    .input-box input,
    .input-box select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:15px;
    }

    .book-btn{
      width:100%;
      padding:12px;
      background:#0077b6;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    .book-btn:hover{
      background:#023e8a;
    }

    .appointment-list{
      margin-top:30px;
    }

    .appointment-card{
      background:#e9f7ff;
      padding:15px;
      border-radius:8px;
      margin-bottom:15px;
      border-left:5px solid #0077b6;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Appointment Booking</h1>

    <p>Book Your Doctor Appointment</p>

    <!-- Appointment Form -->

    <div class="input-box">
      <input type="text"
      id="patientName"
      placeholder="Patient Name">
    </div>

    <div class="input-box">
      <input type="number"
      id="patientAge"
      placeholder="Patient Age">
    </div>

    <div class="input-box">
      <select id="doctorName">

        <option value="">
          Select Doctor
        </option>

        <option>
          Dr. Sharma - Cardiologist
        </option>

        <option>
          Dr. Mehta - Neurologist
        </option>

        <option>
          Dr. Verma - Orthopedic
        </option>

      </select>
    </div>

    <div class="input-box">
      <input type="date"
      id="appointmentDate">
    </div>

    <div class="input-box">
      <input type="time"
      id="appointmentTime">
    </div>

    <button class="book-btn"
    onclick="bookAppointment()">
      Book Appointment
    </button>

    <!-- Appointment Records -->

    <div class="appointment-list"
    id="appointmentList">

    </div>

  </div>

  <script>

    function bookAppointment(){

      let patientName =
        document.getElementById("patientName").value;

      let patientAge =
        document.getElementById("patientAge").value;

      let doctorName =
        document.getElementById("doctorName").value;

      let appointmentDate =
        document.getElementById("appointmentDate").value;

      let appointmentTime =
        document.getElementById("appointmentTime").value;

      // Validation

      if(patientName === "" ||
         patientAge === "" ||
         doctorName === "" ||
         appointmentDate === "" ||
         appointmentTime === ""){

          alert("Please Fill All Fields");

          return;
      }

      // Appointment Card

      let appointmentCard =
        document.createElement("div");

      appointmentCard.classList.add(
        "appointment-card"
      );

      appointmentCard.innerHTML = `
        <h3>${patientName}</h3>

        <p><strong>Age:</strong>
        ${patientAge}</p>

        <p><strong>Doctor:</strong>
        ${doctorName}</p>

        <p><strong>Date:</strong>
        ${appointmentDate}</p>

        <p><strong>Time:</strong>
        ${appointmentTime}</p>
      `;

      // Add Appointment

      document.getElementById("appointmentList")
      .appendChild(appointmentCard);

      alert("Appointment Booked Successfully");

      // Clear Form

      document.getElementById("patientName")
      .value = "";

      document.getElementById("patientAge")
      .value = "";

      document.getElementById("doctorName")
      .value = "";

      document.getElementById("appointmentDate")
      .value = "";

      document.getElementById("appointmentTime")
      .value = "";
    }

  </script>

</body>
</html>
